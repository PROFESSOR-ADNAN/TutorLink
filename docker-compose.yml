services:

  # ── Express API (backend) ─────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: tutorlink_backend
    restart: unless-stopped
    env_file:
      - ./backend/.env       
    environment:
      NODE_ENV: development 
    ports:
      - "5000:5000"
    volumes:
      - ./backend/src:/app/src:ro  
    command: npm run dev

  # ── React frontend ────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: tutorlink_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      VITE_API_URL: http://localhost:5000/api
    ports:
      - "3000:80"
